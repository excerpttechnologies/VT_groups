# NGINX Configuration for Next.js Land Management Application
# 
# This file should be placed in: /etc/nginx/sites-available/land-management
# Then symlink it: ln -s /etc/nginx/sites-available/land-management /etc/nginx/sites-enabled/
# Test config: nginx -t
# Restart: systemctl restart nginx

# ============================================================================
# Upstream: Next.js Application Server
# ============================================================================
upstream nextjs_backend {
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
}

# ============================================================================
# HTTP → HTTPS Redirect (Port 80)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt ACME challenge (for certificate renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
}

# ============================================================================
# HTTPS: Main Application Server (Port 443)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # =========================================================================
    # SSL/TLS Configuration
    # =========================================================================
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL Protocols: Only TLS 1.2 and above
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Cipher suites (high security)
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # =========================================================================
    # Security Headers
    # =========================================================================
    # Force HTTPS for future connections
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # =========================================================================
    # Logging
    # =========================================================================
    error_log /var/log/nginx/land-management-error.log;
    access_log /var/log/nginx/land-management-access.log combined buffer=32k flush=1m;

    # =========================================================================
    # Client Settings
    # =========================================================================
    # Max file upload size
    client_max_body_size 50M;
    
    # Timeouts
    client_body_timeout 20s;
    client_header_timeout 20s;

    # =========================================================================
    # Gzip Compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    # =========================================================================
    # Root Directory (for static files)
    # =========================================================================
    root /home/app/land-management/.next/static;

    # =========================================================================
    # Reverse Proxy Configuration
    # =========================================================================
    location / {
        # Forward request to Next.js backend
        proxy_pass http://nextjs_backend;
        
        # HTTP Version (1.1 for keep-alive)
        proxy_http_version 1.1;

        # ===================================================================
        # CRITICAL: Headers passed to backend
        # ===================================================================
        # Host header (so Next.js knows the domain)
        proxy_set_header Host $host;
        
        # Real IP of client (important for logging, security)
        proxy_set_header X-Real-IP $remote_addr;
        
        # All IPs in the chain
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Original protocol (HTTP or HTTPS)
        # IMPORTANT: Tells Next.js about HTTPS, needed for secure cookies
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Original host
        proxy_set_header X-Forwarded-Host $host;
        
        # Original port
        proxy_set_header X-Forwarded-Port $server_port;

        # ===================================================================
        # WebSocket Support (if needed)
        # ===================================================================
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ===================================================================
        # Timeouts
        # ===================================================================
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ===================================================================
        # Buffering
        # ===================================================================
        # Disable buffering for real-time/streaming responses
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # =========================================================================
    # Static Files: Cache Long-Term (skip Next.js)
    # =========================================================================
    location /_next/static {
        alias /home/app/land-management/.next/static;
        
        # These are immutable and can be cached forever
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Gzip compression
        gzip on;
        gzip_static on;
    }

    # =========================================================================
    # Static Files: Cache Short-Term
    # =========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # =========================================================================
    # Health Check Endpoint (for monitoring)
    # =========================================================================
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # =========================================================================
    # Deny Access to Hidden Files
    # =========================================================================
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }
}
